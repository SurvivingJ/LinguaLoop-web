<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/portal.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Project Portal</h1>
            <p class="subtitle">A collection of web apps and tools</p>
        </header>

        <div class="card-grid">
            {% for project in projects %}
            <a href="{{ project.url }}" class="card" target="_blank" rel="noopener">
                <div class="card-icon">
                    <i class="fas {{ project.icon }}"></i>
                </div>
                <h2>{{ project.name }}</h2>
                <p>{{ project.description }}</p>
                <div class="tags">
                    {% for tag in project.tags %}
                    <span class="tag">{{ tag }}</span>
                    {% endfor %}
                </div>
                <span class="launch">Launch <i class="fas fa-arrow-right"></i></span>
            </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
