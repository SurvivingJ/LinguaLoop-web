{% extends "base.html" %}

{% block title %}Measure Word Drill | LinguaDojo{% endblock %}

{% block body_class %}bg-slate-50{% endblock %}

{% block extra_css %}
<style>
    .cd-header {
        background: var(--bg-surface);
        border-bottom: 2px solid var(--border-default);
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: var(--shadow-sm);
        flex-wrap: wrap;
        row-gap: 8px;
    }
    .cd-header-left {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        flex: 1 1 auto;
    }
    .cd-header-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 0 0 auto;
    }
    .cd-header-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1 1 100%;
        justify-content: center;
    }
    .cd-progress-bar {
        height: 6px;
        background: var(--border-default);
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
    }
    .cd-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--primary) 0%, var(--info) 100%);
        transition: width 0.3s ease;
        width: 0;
    }

    .cd-stage {
        max-width: 640px;
        margin: 0 auto;
        padding: 48px 20px;
    }

    .cd-prompt {
        text-align: center;
        font-size: 3.5rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--text-primary);
        margin-bottom: 12px;
        line-height: 1.1;
    }

    .cd-blank {
        display: inline-block;
        min-width: 1.2em;
        border-bottom: 4px solid var(--info);
        color: transparent;
    }

    .cd-pronunciation {
        text-align: center;
        font-size: 1.5rem;
        color: var(--text-muted);
        margin-bottom: 4px;
    }

    .cd-gloss {
        text-align: center;
        font-size: 1.05rem;
        color: var(--text-secondary);
        margin-bottom: 36px;
    }

    .cd-options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 28px;
    }

    .cd-option {
        font-size: 2.25rem;
        font-weight: 600;
        padding: 18px 8px;
        border: 2px solid var(--border-default);
        border-radius: 12px;
        background: var(--bg-surface);
        cursor: pointer;
        transition: transform 0.1s, border-color 0.1s, background 0.15s;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
    }
    /* Hover styles are gated to devices that actually support hover so
       mobile WebKit doesn't leave the previously-tapped option stuck in
       the hover state when the next question is rendered. */
    @media (hover: hover) and (pointer: fine) {
        .cd-option:hover:not(:disabled) {
            border-color: var(--primary);
            transform: translateY(-1px);
        }
    }
    .cd-option:focus { outline: none; }
    .cd-option:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .cd-option:disabled { cursor: default; opacity: 0.65; }
    .cd-option.correct  { background: #ecfdf5; border-color: #10b981; }
    .cd-option.wrong    { background: #fef2f2; border-color: #ef4444; }
    .cd-option .cd-option-key {
        position: absolute;
        top: 6px;
        left: 8px;
        font-size: 0.75rem;
        color: var(--text-muted);
        font-weight: 500;
    }
    .cd-option .cd-option-pinyin {
        font-size: 0.95rem;
        color: var(--text-muted);
        font-weight: 400;
    }

    .cd-typed-input {
        display: block;
        width: 100%;
        font-size: 2.5rem;
        font-weight: 600;
        text-align: center;
        padding: 14px 8px;
        border: 2px solid var(--border-default);
        border-radius: 12px;
        background: var(--bg-surface);
        outline: none;
        transition: border-color 0.1s;
    }
    .cd-typed-input:focus { border-color: var(--primary); }
    .cd-typed-input.wrong { border-color: #ef4444; background: #fef2f2; }
    .cd-typed-input.correct { border-color: #10b981; background: #ecfdf5; }

    .cd-feedback {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.65);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 200;
        padding: 20px;
    }
    .cd-feedback.show { display: flex; }
    .cd-feedback-card {
        background: var(--bg-surface);
        border-radius: 16px;
        padding: 28px;
        max-width: 480px;
        width: 100%;
        box-shadow: var(--shadow-lg);
    }
    .cd-feedback-canonical {
        font-size: 3rem;
        text-align: center;
        font-weight: 700;
        margin: 8px 0 4px;
    }
    .cd-feedback-canonical .hl { color: var(--info); }
    .cd-feedback-group {
        text-align: center;
        font-size: 0.95rem;
        color: var(--text-secondary);
        margin-bottom: 18px;
    }
    .cd-feedback-examples {
        background: var(--bg-page);
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 1rem;
        margin-bottom: 18px;
    }
    .cd-feedback-cta {
        width: 100%;
        background: var(--primary);
        color: white;
        font-weight: 600;
        padding: 14px;
        border-radius: 10px;
        border: 0;
        cursor: pointer;
        font-size: 1rem;
    }

    .cd-results {
        max-width: 480px;
        margin: 56px auto;
        padding: 36px 28px;
        background: var(--bg-surface);
        border-radius: 16px;
        box-shadow: var(--shadow-md);
        text-align: center;
    }
    .cd-results-grade {
        font-size: 4rem;
        margin: 8px 0;
    }
    .cd-results-pct {
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--primary);
    }
    .cd-results-stats {
        display: flex;
        justify-content: center;
        gap: 36px;
        margin: 20px 0 24px;
        font-size: 0.95rem;
        color: var(--text-secondary);
    }
    .cd-results-elo-badge {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 999px;
        background: var(--bg-page);
        font-weight: 600;
        margin-bottom: 18px;
    }
    .cd-results-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 16px;
    }
    .cd-mode-toggle {
        display: inline-flex;
        background: var(--bg-page);
        border-radius: 999px;
        padding: 4px;
    }
    .cd-mode-toggle button {
        background: transparent;
        border: 0;
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
    }
    .cd-mode-toggle button.active {
        background: var(--bg-surface);
        color: var(--text-primary);
        box-shadow: var(--shadow-sm);
    }

    /* ===== Mobile (≤640px) ============================================ */
    @media (max-width: 640px) {
        .cd-stage { padding: 24px 14px; }
        .cd-prompt { font-size: 2.5rem; letter-spacing: 0.05em; }
        .cd-pronunciation { font-size: 1.2rem; }
        .cd-gloss { font-size: 0.95rem; margin-bottom: 24px; }
        .cd-options { gap: 10px; margin-top: 20px; }
        .cd-option { font-size: 1.85rem; padding: 16px 6px; min-height: 76px; }
        .cd-option .cd-option-key { font-size: 0.7rem; top: 4px; left: 6px; }
        .cd-option .cd-option-pinyin { font-size: 0.85rem; }
        .cd-typed-input { font-size: 2rem; padding: 12px 6px; }

        .cd-feedback-card { padding: 22px 18px; }
        .cd-feedback-canonical { font-size: 2.1rem; }
        .cd-feedback-group { font-size: 0.9rem; }
        .cd-feedback-examples { font-size: 0.9rem; padding: 10px 12px; }

        .cd-results { margin: 28px 14px; padding: 28px 20px; }
        .cd-results-grade { font-size: 3rem; }
        .cd-results-pct { font-size: 2.1rem; }
        .cd-results-stats { gap: 20px; font-size: 0.85rem; }

        .cd-mode-toggle button { padding: 5px 10px; font-size: 0.8rem; }

        /* Cloze-mode sentence container shrinks too */
        #cdReversePrompt { font-size: 1rem !important; }
        #cdReversePrompt > div:last-child { font-size: 1.25rem !important; line-height: 1.5; }
    }
    @media (max-width: 380px) {
        .cd-prompt { font-size: 2.1rem; }
        .cd-option { font-size: 1.6rem; min-height: 68px; }
        .cd-results-actions { grid-template-columns: 1fr; }
    }
</style>
{% endblock %}

{% block content %}
<div id="cdHeader" class="cd-header py-3 px-3 px-md-4 flex items-center justify-between gap-2" style="display:none;">
    <div class="cd-header-left">
        <a href="/" class="text-slate-500 hover:text-slate-700" aria-label="Home" style="font-size: 1.1rem; line-height: 1;">&larr;</a>
        <h1 class="text-base font-semibold" data-i18n="classifier_drill.title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Measure Words</h1>
    </div>
    <div class="cd-header-right">
        <div class="text-xs text-slate-500" id="cdLevelBadge" style="display:none;"></div>
        <div class="text-sm text-slate-500" style="white-space: nowrap;"><span id="cdProgressLabel">0</span> / <span id="cdProgressTotal">0</span></div>
    </div>
    <div class="cd-header-controls">
        <div class="cd-mode-toggle" id="cdModeToggle" title="Auto adapts each item to your per-classifier mastery">
            <button type="button" data-mode="auto" class="active" data-i18n="classifier_drill.mode_auto">Auto</button>
            <button type="button" data-mode="mc"   data-i18n="classifier_drill.mode_mc">Choose</button>
            <button type="button" data-mode="type" data-i18n="classifier_drill.mode_type">Type</button>
        </div>
    </div>
    <div class="cd-progress-bar"><div class="cd-progress-fill" id="cdProgressFill"></div></div>
</div>

<div id="cdLoading" class="text-center py-20 text-slate-500" data-i18n="classifier_drill.loading">Loading…</div>

<div id="cdStage" class="cd-stage" style="display:none;">
    <div class="cd-prompt" id="cdPromptWrap">
        <span>一</span>
        <span class="cd-blank" id="cdPromptBlank">_</span>
        <span id="cdNoun"></span>
    </div>
    <div class="cd-pronunciation" id="cdPronunciation"></div>
    <div class="cd-gloss" id="cdGloss"></div>
    <div class="cd-gloss" id="cdReversePrompt" style="display:none; font-size:1.1rem; color:var(--text-secondary);"></div>

    <div class="cd-options" id="cdOptions" style="display:none;"></div>

    <form id="cdTypedForm" style="display:none;" autocomplete="off">
        <input id="cdTypedInput" type="text" class="cd-typed-input" maxlength="2"
               inputmode="text" autocapitalize="off"
               data-i18n-placeholder="classifier_drill.typed_placeholder"
               placeholder="量词" />
    </form>
</div>

<div id="cdFeedback" class="cd-feedback" role="dialog" aria-modal="true">
    <div class="cd-feedback-card">
        <div class="cd-feedback-canonical" id="cdFeedbackCanonical"></div>
        <div class="cd-feedback-group" id="cdFeedbackGroup"></div>
        <div class="cd-feedback-examples" id="cdFeedbackExamples"></div>
        <button class="cd-feedback-cta" id="cdFeedbackContinue" data-i18n="classifier_drill.feedback_continue">Continue</button>
    </div>
</div>

<div id="cdResults" class="cd-results" style="display:none;">
    <div class="cd-results-grade" id="cdResultsGrade">🎯</div>
    <div class="cd-results-pct"><span id="cdResultsPct">0</span>%</div>
    <div class="cd-results-stats">
        <div><strong id="cdResultsCorrect">0</strong> / <span id="cdResultsTotal">0</span> <span data-i18n="classifier_drill.results_classifiers">classifiers</span></div>
        <div><strong id="cdResultsTime">0</strong>s</div>
    </div>
    <div class="cd-results-elo-badge" id="cdResultsElo" style="display:none;"></div>
    <div class="cd-results-actions">
        <button class="cd-feedback-cta" id="cdResultsNext" data-i18n="classifier_drill.results_next">Next round</button>
        <button class="cd-feedback-cta" id="cdResultsExit" style="background: var(--bg-page); color: var(--text-primary);" data-i18n="classifier_drill.results_exit">Done</button>
    </div>
</div>

<script>
(function() {
    'use strict';

    const TARGET_LANGUAGE = 1; // Chinese
    const BATCH_SIZE = 20;

    // Mode override: 'auto' uses item.level; 'mc' or 'type' pin globally.
    const state = {
        mode: localStorage.getItem('cd_mode') || 'auto',
        items: [],
        cursor: 0,
        correct: 0,
        errors: [],
        startTime: 0,
        currentOptions: [],   // shuffled correct+distractors for MC/Reverse
        isLocked: false,
        currentItem: null,
        itemResults: [],      // per-item {classifier_id, is_correct} for mastery
        effectiveLevel: 1,    // 1=MC, 2=Typed, 3=Reverse — set per-item
    };

    const el = {
        header: document.getElementById('cdHeader'),
        loading: document.getElementById('cdLoading'),
        stage: document.getElementById('cdStage'),
        promptWrap: document.getElementById('cdPromptWrap'),
        promptBlank: document.getElementById('cdPromptBlank'),
        noun: document.getElementById('cdNoun'),
        pronunciation: document.getElementById('cdPronunciation'),
        gloss: document.getElementById('cdGloss'),
        reversePrompt: document.getElementById('cdReversePrompt'),
        options: document.getElementById('cdOptions'),
        typedForm: document.getElementById('cdTypedForm'),
        typedInput: document.getElementById('cdTypedInput'),
        progressLabel: document.getElementById('cdProgressLabel'),
        progressTotal: document.getElementById('cdProgressTotal'),
        progressFill: document.getElementById('cdProgressFill'),
        levelBadge: document.getElementById('cdLevelBadge'),
        feedback: document.getElementById('cdFeedback'),
        fbCanonical: document.getElementById('cdFeedbackCanonical'),
        fbGroup: document.getElementById('cdFeedbackGroup'),
        fbExamples: document.getElementById('cdFeedbackExamples'),
        fbContinue: document.getElementById('cdFeedbackContinue'),
        results: document.getElementById('cdResults'),
        resultsGrade: document.getElementById('cdResultsGrade'),
        resultsPct: document.getElementById('cdResultsPct'),
        resultsCorrect: document.getElementById('cdResultsCorrect'),
        resultsTotal: document.getElementById('cdResultsTotal'),
        resultsTime: document.getElementById('cdResultsTime'),
        resultsElo: document.getElementById('cdResultsElo'),
        modeToggle: document.getElementById('cdModeToggle'),
    };

    function tr(key, params) {
        return (window.LinguaI18n && window.LinguaI18n.t)
            ? window.LinguaI18n.t(key, params)
            : key;
    }

    function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    async function init() {
        try {
            if (window.LinguaI18n && window.LinguaI18n.init) {
                await window.LinguaI18n.init();
            }
            applyModeToToggle();
            bindModeToggle();
            bindFeedback();
            bindResults();
            bindKeyboard();
            await loadBatch();
        } catch (err) {
            console.error('Classifier drill init error:', err);
            el.loading.textContent = tr('classifier_drill.error_init') + ' ' + (err.message || '');
        }
    }

    function applyModeToToggle() {
        const buttons = el.modeToggle.querySelectorAll('button');
        buttons.forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
    }

    function bindModeToggle() {
        el.modeToggle.addEventListener('click', function(e) {
            const btn = e.target.closest('button[data-mode]');
            if (!btn) return;
            state.mode = btn.dataset.mode;
            localStorage.setItem('cd_mode', state.mode);
            applyModeToToggle();
            if (state.currentItem) renderInput();
        });
    }

    function bindFeedback() {
        el.fbContinue.addEventListener('click', closeFeedback);
    }

    function bindResults() {
        document.getElementById('cdResultsNext').addEventListener('click', function() {
            el.results.style.display = 'none';
            loadBatch();
        });
        document.getElementById('cdResultsExit').addEventListener('click', function() {
            window.location.href = '/';
        });
    }

    function bindKeyboard() {
        document.addEventListener('keydown', function(e) {
            if (el.feedback.classList.contains('show')) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    closeFeedback();
                }
                return;
            }
            if (state.isLocked || !state.currentItem) return;
            // Keys 1-4 dispatch in MC + Reverse modes
            if (state.effectiveLevel !== 2) {
                const idx = parseInt(e.key, 10);
                if (idx >= 1 && idx <= state.currentOptions.length) {
                    e.preventDefault();
                    handleChoiceClick(idx - 1);
                }
            }
        });
    }

    function effectiveLevelForItem(item) {
        // Manual overrides win.
        if (state.mode === 'mc')   return 1;
        if (state.mode === 'type') return 2;
        // Auto: use the server-stamped per-classifier level (1..4).
        const lvl = parseInt(item.level || 1, 10);
        return Math.max(1, Math.min(4, lvl));
    }

    async function loadBatch() {
        el.loading.style.display = 'block';
        el.stage.style.display = 'none';
        el.results.style.display = 'none';
        el.header.style.display = 'none';

        const url = '/api/classifier-drill/session?language_id=' + TARGET_LANGUAGE + '&count=' + BATCH_SIZE;
        const resp = await window.authFetch(url);
        if (!resp.ok) {
            el.loading.textContent = tr('classifier_drill.error_load') + ' (' + resp.status + ')';
            return;
        }
        const data = await resp.json();
        const items = (data && (data.data && data.data.items || data.items)) || [];
        if (!items.length) {
            el.loading.textContent = tr('classifier_drill.error_empty');
            return;
        }

        state.items = items;
        state.cursor = 0;
        state.correct = 0;
        state.errors = [];
        state.itemResults = [];
        state.startTime = Date.now();
        state.isLocked = false;

        el.progressTotal.textContent = items.length;
        el.loading.style.display = 'none';
        el.header.style.display = 'flex';
        el.stage.style.display = 'block';
        renderCurrent();
    }

    function renderCurrent() {
        if (state.cursor >= state.items.length) {
            return finishBatch();
        }
        // Drop focus from whatever the user last interacted with so the
        // previous question's tapped option doesn't carry a sticky :focus/
        // :hover state into the new render (mostly a mobile issue).
        if (document.activeElement && typeof document.activeElement.blur === 'function') {
            document.activeElement.blur();
        }
        state.currentItem = state.items[state.cursor];
        state.isLocked = false;
        state.effectiveLevel = effectiveLevelForItem(state.currentItem);

        el.progressLabel.textContent = String(state.cursor + 1);
        el.progressFill.style.width = (100 * state.cursor / state.items.length) + '%';

        // Level badge in header (only visible in Auto mode to make
        // promotions/demotions transparent)
        if (state.mode === 'auto') {
            const tag = state.effectiveLevel === 1 ? '· MC'
                       : state.effectiveLevel === 2 ? '· Type'
                       : state.effectiveLevel === 3 ? '· Reverse'
                       : '· Cloze';
            el.levelBadge.textContent = tag;
            el.levelBadge.style.display = 'inline';
        } else {
            el.levelBadge.style.display = 'none';
        }

        renderInput();
    }

    function renderInput() {
        const lvl = state.effectiveLevel;

        if (lvl === 4 && state.currentItem.cloze_blanked) {
            renderClozeStage();
            return;
        }
        if (lvl === 3) {
            renderReverseStage();
            return;
        }
        renderForwardStage();
        if (lvl === 2) {
            el.typedForm.style.display = 'block';
            el.options.style.display = 'none';
            el.typedInput.value = '';
            el.typedInput.classList.remove('wrong', 'correct');
            // Auto-focus EVERY render so user can type immediately.
            requestAnimationFrame(() => el.typedInput.focus());
        } else {
            el.typedForm.style.display = 'none';
            el.options.style.display = 'grid';
            renderMcOptions();
        }
    }

    function renderClozeStage() {
        // Level 4: display the full sentence with ___ blanked out;
        // present 4 classifier options to fill it.
        const item = state.currentItem;
        const blanked = item.cloze_blanked || '';
        // Re-use the prompt area as a sentence container.
        el.promptWrap.style.display = 'block';
        el.promptBlank.textContent = '';
        el.noun.textContent = '';
        el.pronunciation.textContent = '';
        el.gloss.textContent = '';
        el.reversePrompt.style.display = 'block';
        el.reversePrompt.innerHTML =
            '<div style="font-size:0.95rem; color:var(--text-muted); margin-bottom:8px;">' +
                tr('classifier_drill.cloze_prompt') +
            '</div>' +
            '<div style="font-size:1.6rem; font-weight:600; line-height:1.5; color:var(--text-primary);">' +
                escapeHtml(blanked).replace(/___/g, '<span style="color:var(--info); border-bottom:3px solid var(--info); padding:0 8px;">&nbsp;___&nbsp;</span>') +
            '</div>';
        el.typedForm.style.display = 'none';
        el.options.style.display = 'grid';
        renderMcOptions();
    }

    function renderForwardStage() {
        // "一 ___ <noun>" prompt; gloss + pinyin below.
        const item = state.currentItem;
        el.promptWrap.style.display = 'block';
        el.reversePrompt.style.display = 'none';
        el.promptBlank.textContent = '_';
        el.noun.textContent = item.noun_lemma || '';
        el.pronunciation.textContent = item.noun_pronunciation || '';
        el.gloss.textContent = item.noun_gloss || '';
    }

    function renderReverseStage() {
        // Reverse: show "一 <classifier> ?" prompt; learner picks a noun.
        const item = state.currentItem;
        const canonical = (item.correct_classifier_hanzi || [])[0] || '';
        el.promptWrap.style.display = 'block';
        el.promptBlank.textContent = canonical;
        el.promptBlank.style.color = 'var(--info)';
        el.promptBlank.style.borderBottom = 'none';
        el.noun.textContent = '?';
        el.pronunciation.textContent = '';
        el.gloss.textContent = '';
        el.reversePrompt.style.display = 'block';
        el.reversePrompt.textContent = tr('classifier_drill.reverse_prompt') + ' ' + canonical;

        // Pool: correct noun + 3 distractor nouns
        const pool = [{ id: 'noun:' + (item.noun_lemma || ''), hanzi: item.noun_lemma || '', pinyin: '', is_correct: true }];
        const distractors = item.reverse_noun_options || [];
        distractors.forEach(function(n) {
            pool.push({ id: 'noun:' + n, hanzi: n, pinyin: '', is_correct: false });
        });
        state.currentOptions = shuffle(pool);

        el.typedForm.style.display = 'none';
        el.options.style.display = 'grid';
        el.options.innerHTML = '';
        state.currentOptions.forEach(function(opt, idx) {
            const btn = document.createElement('button');
            btn.className = 'cd-option';
            btn.type = 'button';
            btn.dataset.idx = idx;
            btn.innerHTML =
                '<span class="cd-option-key">' + (idx + 1) + '</span>' +
                '<span>' + escapeHtml(opt.hanzi) + '</span>';
            btn.addEventListener('click', function() { handleChoiceClick(idx); });
            el.options.appendChild(btn);
        });
    }

    function resetPromptStyles() {
        el.promptBlank.style.color = '';
        el.promptBlank.style.borderBottom = '';
    }

    function renderMcOptions() {
        const item = state.currentItem;
        const correctHanzi = (item.correct_classifier_hanzi || [])[0];
        const correctId = (item.correct_classifier_ids || [])[0];
        const distractorIds = item.distractor_ids || [];
        const distractorHanzi = item.distractor_hanzi || [];
        const distractorPinyin = item.distractor_pinyin || [];

        // Build pool: [correct] + distractors, then shuffle
        const pool = [{ id: correctId, hanzi: correctHanzi, pinyin: '', is_correct: true }];
        for (let i = 0; i < distractorIds.length; i++) {
            pool.push({
                id: distractorIds[i],
                hanzi: distractorHanzi[i] || '',
                pinyin: distractorPinyin[i] || '',
                is_correct: false,
            });
        }
        state.currentOptions = shuffle(pool);

        el.options.innerHTML = '';
        state.currentOptions.forEach(function(opt, idx) {
            const btn = document.createElement('button');
            btn.className = 'cd-option';
            btn.type = 'button';
            btn.dataset.idx = idx;
            btn.innerHTML =
                '<span class="cd-option-key">' + (idx + 1) + '</span>' +
                '<span>' + escapeHtml(opt.hanzi) + '</span>' +
                (opt.pinyin ? '<span class="cd-option-pinyin">' + escapeHtml(opt.pinyin) + '</span>' : '');
            btn.addEventListener('click', function() { handleMcClick(idx); });
            el.options.appendChild(btn);
        });
    }

    function handleChoiceClick(idx) {
        if (state.isLocked) return;
        state.isLocked = true;
        const opt = state.currentOptions[idx];

        let isCorrect;
        if (state.effectiveLevel === 3) {
            isCorrect = !!opt.is_correct;
        } else {
            const correctIds = state.currentItem.correct_classifier_ids || [];
            isCorrect = correctIds.indexOf(opt.id) !== -1;
        }
        recordAnswer(isCorrect, opt.hanzi);

        const buttons = el.options.querySelectorAll('.cd-option');
        buttons.forEach(function(b) { b.disabled = true; });

        const clickedBtn = buttons[idx];
        // Drop focus immediately so mobile WebKit doesn't paint a sticky
        // :focus/:hover ring on the option we just tapped. The class-based
        // .correct/.wrong styles handle the intentional feedback below.
        if (clickedBtn && typeof clickedBtn.blur === 'function') clickedBtn.blur();

        if (isCorrect) {
            clickedBtn.classList.add('correct');
            setTimeout(advance, 400);
        } else {
            clickedBtn.classList.add('wrong');
            state.currentOptions.forEach(function(o, i) {
                if (o.is_correct) buttons[i].classList.add('correct');
            });
            setTimeout(function() { openFeedback(opt.hanzi); }, 280);
        }
    }

    el.typedForm.addEventListener('submit', function(e) {
        e.preventDefault();
        if (state.isLocked || !state.currentItem) return;
        const raw = (el.typedInput.value || '').trim();
        if (!raw) return;
        const correctHanzi = state.currentItem.correct_classifier_hanzi || [];
        const isCorrect = correctHanzi.indexOf(raw) !== -1;
        state.isLocked = true;
        recordAnswer(isCorrect, raw);
        if (isCorrect) {
            el.typedInput.classList.add('correct');
            setTimeout(advance, 400);
        } else {
            el.typedInput.classList.add('wrong');
            setTimeout(function() { openFeedback(raw); }, 250);
        }
    });

    function recordAnswer(isCorrect, picked) {
        const cid = state.currentItem.classifier_id_primary;
        if (typeof cid === 'number') {
            state.itemResults.push({
                classifier_id: cid,
                is_correct: !!isCorrect,
                level: state.effectiveLevel,
            });
        }
        if (isCorrect) {
            state.correct += 1;
        } else {
            state.errors.push({
                lemma: state.currentItem.noun_lemma,
                picked: picked,
                correct: state.currentItem.correct_classifier_hanzi,
                ts: Date.now(),
            });
        }
    }

    function openFeedback(picked) {
        const item = state.currentItem;
        const canonical = (item.correct_classifier_hanzi || [])[0] || '';
        const altList = (item.correct_classifier_hanzi || []).slice(1);
        const altSuffix = altList.length
            ? ' <span style="font-size:1.5rem; color: var(--text-muted);">(' + tr('classifier_drill.also') + ': ' + altList.join(' / ') + ')</span>'
            : '';
        el.fbCanonical.innerHTML = '一 <span class="hl">' + escapeHtml(canonical) + '</span> ' + escapeHtml(item.noun_lemma || '') + altSuffix;
        const groupLabel = item.semantic_label || '';
        el.fbGroup.textContent = groupLabel;

        // examples come from the classifier's own example_nouns (server didn't ship them
        // per-item; fall back to picked hint for now via the group label)
        el.fbExamples.textContent = tr('classifier_drill.your_answer') + ': ' + picked;

        el.feedback.classList.add('show');
        el.fbContinue.focus();
    }

    function closeFeedback() {
        el.feedback.classList.remove('show');
        advance();
    }

    function advance() {
        resetPromptStyles();
        state.cursor += 1;
        renderCurrent();
    }

    async function finishBatch() {
        const total = state.items.length;
        const correct = state.correct;
        const pct = total ? Math.round((correct / total) * 100) : 0;
        const time = Math.round((Date.now() - state.startTime) / 1000);

        el.stage.style.display = 'none';
        el.progressFill.style.width = '100%';
        el.progressLabel.textContent = String(total);

        el.resultsPct.textContent = pct;
        el.resultsCorrect.textContent = correct;
        el.resultsTotal.textContent = total;
        el.resultsTime.textContent = time;
        el.resultsGrade.textContent = pct >= 95 ? '🏆' : pct >= 80 ? '🎯' : pct >= 60 ? '👍' : '💪';

        el.results.style.display = 'block';

        // Submit and badge ELO
        try {
            const resp = await window.authFetch('/api/classifier-drill/submit', {
                method: 'POST',
                body: JSON.stringify({
                    language_id: TARGET_LANGUAGE,
                    correct_items: correct,
                    total_items: total,
                    time_taken: time,
                    item_results: state.itemResults,
                }),
            });
            if (resp.ok) {
                const payload = await resp.json();
                const result = (payload && (payload.data || payload)) || {};
                const elo = result.user_elo_change || {};
                if (typeof elo.change === 'number' && elo.change !== 0) {
                    const sign = elo.change > 0 ? '+' : '';
                    el.resultsElo.textContent = tr('classifier_drill.results_elo', { value: sign + elo.change });
                    el.resultsElo.style.display = 'inline-block';
                } else if (typeof elo.change === 'number') {
                    el.resultsElo.textContent = tr('classifier_drill.results_elo_unchanged');
                    el.resultsElo.style.display = 'inline-block';
                }

                // Surface any promotions/demotions
                const updates = result.mastery_updates || [];
                const promotions = updates.filter(function(u) { return u && u.promoted; });
                const demotions  = updates.filter(function(u) { return u && u.demoted; });
                if (promotions.length || demotions.length) {
                    const banner = document.createElement('div');
                    banner.style.cssText = 'margin-top:14px; padding:10px 14px; background:var(--bg-page); border-radius:10px; font-size:0.9rem;';
                    let html = '';
                    if (promotions.length) {
                        html += '<div>🎓 ' + tr('classifier_drill.promoted_n', { count: promotions.length }) + '</div>';
                    }
                    if (demotions.length) {
                        html += '<div>↩️ ' + tr('classifier_drill.demoted_n', { count: demotions.length }) + '</div>';
                    }
                    banner.innerHTML = html;
                    el.results.appendChild(banner);
                }
            }
        } catch (e) {
            console.error('Submit failed:', e);
        }
    }

    function escapeHtml(s) {
        if (window.LinguaUtils && LinguaUtils.escapeHtml) return LinguaUtils.escapeHtml(String(s));
        return String(s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    document.addEventListener('DOMContentLoaded', init);
})();
</script>
{% endblock %}
